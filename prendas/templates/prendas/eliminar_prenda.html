{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Eliminar Prenda</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'prendas/style.css' %}">
</head>
<body>

<nav class="navbar px-4 py-3">
    <span class="navbar-brand fw-semibold fs-5">👕 Mi Tienda de Ropa</span>
    <a href="{% url 'lista_gastos' %}" class="btn btn-outline-secondary">← Volver</a>
</nav>

<div class="container py-5" style="max-width: 500px;">
    <div class="card p-4 text-center">
        <div style="font-size: 48px;">🗑️</div>
        <h5 class="mt-3">¿Eliminar este gasto?</h5>
        <p class="text-muted">Vas a eliminar <strong>{{ gasto.concepto }}</strong> ({{ gasto.importe }}€). Esta acción no se puede deshacer.</p>
        <form method="POST">
            {% csrf_token %}
            <div class="d-flex gap-2 justify-content-center mt-3">
                <a href="{% url 'lista_gastos' %}" class="btn btn-outline-secondary">Cancelar</a>
                <button type="submit" class="btn btn-danger">Sí, eliminar</button>
            </div>
        </form>
    </div>
</div>

</body>
</html>
