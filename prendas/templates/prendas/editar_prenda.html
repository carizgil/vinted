{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Editar Prenda</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'prendas/style.css' %}">
</head>
<body>

<!-- NAV -->
<nav class="navbar px-4 py-3">
    <span class="navbar-brand fw-semibold fs-5">👕 Mi Tienda de Ropa</span>
    <a href="{% url 'lista_prendas' %}" class="btn btn-outline-secondary">← Volver</a>
</nav>

<div class="container py-4" style="max-width: 600px;">
    <h4 class="mb-4">Editar — {{ prenda.tipo_de_prenda }}</h4>

    <form method="POST">
        {% csrf_token %}

        <div class="mb-3">
            <label class="form-label">Tipo de prenda</label>
            <input type="text" name="tipo_de_prenda" value="{{ prenda.tipo_de_prenda }}" class="form-control">
        </div>

        <div class="row g-3 mb-3">
            <div class="col">
                <label class="form-label">Talla</label>
                <input type="text" name="talla" value="{{ prenda.talla }}" class="form-control">
            </div>
            <div class="col">
                <label class="form-label">Color</label>
                <input type="text" name="color" value="{{ prenda.color }}" class="form-control">
            </div>
        </div>

        <div class="mb-3">
            <label class="form-label">Marca</label>
            <input type="text" name="marca" value="{{ prenda.marca }}" class="form-control">
        </div>

        <div class="mb-3">
            <label class="form-label">Dónde está subido</label>
            <input type="text" name="donde_esta_subido" value="{{ prenda.donde_esta_subido }}" class="form-control">
        </div>

        <div class="row g-3 mb-3">
            <div class="col">
                <label class="form-label">Precio comprado (€)</label>
                <input type="number" step="0.01" name="precio_comprado" value="{{ prenda.precio_comprado }}" class="form-control">
            </div>
            <div class="col">
                <label class="form-label">Precio de venta (€)</label>
                <input type="number" step="0.01" name="precio_vendido" value="{{ prenda.precio_vendido }}" class="form-control">
            </div>
        </div>

        <div class="mb-4">
            <label class="form-label">Estado</label>
            <select name="estado" class="form-select">
                <option value="borrador" {% if prenda.estado == 'borrador' %}selected{% endif %}>Borrador</option>
                <option value="disponible" {% if prenda.estado == 'disponible' %}selected{% endif %}>Disponible</option>
                <option value="vendido" {% if prenda.estado == 'vendido' %}selected{% endif %}>Vendido</option>
            </select>
        </div>

        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-dark">Guardar cambios</button>
            <a href="{% url 'lista_prendas' %}" class="btn btn-outline-secondary">Cancelar</a>
        </div>

    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
