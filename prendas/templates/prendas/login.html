{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Iniciar sesión · Mi Tienda de Ropa</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'prendas/style.css' %}">
</head>
<body class="login-body">

<div class="login-wrap">
    <div class="login-card">

        <div class="login-hero">
            <div class="login-hero-emoji">👕</div>
        </div>

        <div class="login-content">
            <h5 class="mb-1 fw-semibold">Mi Tienda de Ropa</h5>
            <p class="text-muted small mb-4">Inicia sesión para gestionar tus prendas</p>

            {% if form.errors %}
            <div class="alert alert-danger py-2 small">
                Usuario o contraseña incorrectos.
            </div>
            {% endif %}

            <form method="POST">
                {% csrf_token %}
                <div class="mb-3 text-start">
                    <label class="form-label">Usuario</label>
                    <input type="text" name="username" class="form-control" required autofocus placeholder="tu usuario">
                </div>
                <div class="mb-4 text-start">
                    <label class="form-label">Contraseña</label>
                    <input type="password" name="password" class="form-control" required placeholder="••••••••">
                </div>
                <button type="submit" class="btn btn-dark w-100">Entrar</button>
            </form>
        </div>

    </div>

    <p class="login-footer">Acceso privado · Solo para el equipo</p>
</div>

</body>
</html>
